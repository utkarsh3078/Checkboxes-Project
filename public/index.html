<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkboxes</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #09111f;
        --bg-2: #13233d;
        --panel: rgba(10, 16, 28, 0.72);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #eef3ff;
        --muted: #a9b7d0;
        --accent: #7dd3fc;
        --accent-strong: #38bdf8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(
            circle at top,
            rgba(125, 211, 252, 0.18),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(56, 189, 248, 0.18),
            transparent 28%
          ),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 32px 18px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
        background-size: 28px 28px;
        mask-image: radial-gradient(circle at center, black, transparent 82%);
        opacity: 0.35;
      }

      main {
        width: min(980px, 100%);
      }

      .card {
        position: relative;
        overflow: hidden;
        padding: 32px;
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(125, 211, 252, 0.12),
          transparent 42%
        );
        pointer-events: none;
      }

      .hero {
        position: relative;
        z-index: 1;
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 0.95;
        letter-spacing: -0.06em;
      }

      .subtitle {
        margin: 0;
        max-width: 36rem;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.6;
      }

      .badge {
        align-self: start;
        padding: 0.55rem 0.9rem;
        border: 1px solid rgba(125, 211, 252, 0.28);
        border-radius: 999px;
        background: rgba(8, 15, 28, 0.55);
        color: var(--accent);
        font-size: 0.78rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      #container {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
        gap: 12px;
      }

      #container input[type="checkbox"] {
        width: 100%;
        aspect-ratio: 1;
        margin: 0;
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        cursor: pointer;
        transition:
          transform 160ms ease,
          background-color 160ms ease,
          border-color 160ms ease,
          box-shadow 160ms ease;
      }

      #container input[type="checkbox"]:hover {
        transform: translateY(-2px);
        border-color: rgba(125, 211, 252, 0.6);
      }

      #container input[type="checkbox"]:checked {
        border-color: rgba(56, 189, 248, 0.95);
        background: linear-gradient(
          135deg,
          var(--accent),
          var(--accent-strong)
        );
        box-shadow:
          0 10px 24px rgba(56, 189, 248, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      #container input[type="checkbox"]:focus-visible {
        outline: 3px solid rgba(125, 211, 252, 0.45);
        outline-offset: 2px;
      }

      @media (max-width: 640px) {
        body {
          padding: 18px;
        }

        .card {
          padding: 22px;
          border-radius: 22px;
        }

        #container {
          grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
          gap: 10px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-labelledby="page-title">
        <div class="hero">
          <div>
            <h1 id="page-title">Checkboxes</h1>
          </div>
        </div>
        <div id="container"></div>
      </section>
    </main>
  </body>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const conatiner = document.getElementById("container");
    const CHECKBOX_COUNT = 100;

    socket.on("server:checkbox:change", (data) => {
      console.log(`Socket Server Event`, data);
      const { checked, index } = data;

      const input = document.getElementById(`checkbox-${index}`);
      if (input) {
        input.checked = checked;
      }
    });

    new Array(CHECKBOX_COUNT).fill(null).forEach((_, index) => {
      const input = document.createElement("input");
      input.type = "checkbox";
      input.id = `checkbox-${index}`;

      input.addEventListener("change", (event) => {
        const checked = event.target.checked;
        console.log("Checked Changed", { index, checked });
        socket.emit("client:checkbox:change", { index, checked });
      });

      conatiner.appendChild(input);
    });
  </script>
</html>
